name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_non_deterministic_e2e:
        description: 'Run non-deterministic E2E tests'
        required: false
        default: false
        type: boolean

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run unit tests
        run: npm run test-unit

      - name: Run deterministic API tests
        run: npm run test-api

      - name: Run deterministic E2E tests
        run: npm run test-e2e

      - name: Run non-deterministic E2E tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_non_deterministic_e2e }}
        env:
          RUN_LLM_TESTS: '1'
        run: npx playwright test --project=e2e-tests --grep "@non-deterministic"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
